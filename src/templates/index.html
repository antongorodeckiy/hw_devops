<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dogs vs Cats</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: white; border-radius: 12px; padding: 40px; width: 400px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        h1 { text-align: center; margin-bottom: 30px; font-size: 22px; }
        .upload-area { border: 2px dashed #ccc; border-radius: 8px; padding: 30px; text-align: center; cursor: pointer; transition: border-color 0.2s; }
        .upload-area:hover { border-color: #666; }
        .upload-area img { max-width: 100%; max-height: 200px; border-radius: 6px; display: none; margin-bottom: 10px; }
        input[type="file"] { display: none; }
        button { width: 100%; margin-top: 16px; padding: 12px; background: #222; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; }
        button:hover { background: #444; }
        .result { margin-top: 20px; text-align: center; font-size: 20px; font-weight: bold; display: none; }
        .result span { font-size: 48px; display: block; margin-bottom: 8px; }
        .confidence { font-size: 14px; color: #666; font-weight: normal; margin-top: 4px; }
        .loading { display: none; text-align: center; margin-top: 20px; color: #666; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🐾 Dogs vs Cats</h1>
        <div class="upload-area" onclick="document.getElementById('fileInput').click()">
            <img id="preview" src="" alt="preview">
            <p id="uploadText">Click to upload image</p>
        </div>
        <input type="file" id="fileInput" accept="image/*">
        <button onclick="predict()">Predict</button>
        <div class="loading" id="loading">Analyzing...</div>
        <div class="result" id="result">
            <span id="emoji"></span>
            <div id="label"></div>
            <div class="confidence" id="confidence"></div>
        </div>
    </div>

    <script>
        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const preview = document.getElementById('preview');
                preview.src = e.target.result;
                preview.style.display = 'block';
                document.getElementById('uploadText').style.display = 'none';
            };
            reader.readAsDataURL(file);
        });

        async function predict() {
            const file = document.getElementById('fileInput').files[0];
            if (!file) { alert('Upload an image first'); return; }

            document.getElementById('loading').style.display = 'block';
            document.getElementById('result').style.display = 'none';

            const formData = new FormData();
            formData.append('file', file);

            const response = await fetch('/predict', { method: 'POST', body: formData });
            const data = await response.json();

            document.getElementById('loading').style.display = 'none';
            document.getElementById('emoji').textContent = data.label === 'dog' ? '🐶' : '🐱';
            document.getElementById('label').textContent = data.label === 'dog' ? 'Dog' : 'Cat';
            document.getElementById('confidence').textContent = `Confidence: ${(data.confidence * 100).toFixed(1)}%`;
            document.getElementById('result').style.display = 'block';
        }
    </script>
</body>
</html>
