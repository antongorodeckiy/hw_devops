[DATA]
data_path = data/
train_size = 0.8
image_size = 64
n_samples = 2000

[MODEL]
algorithm = svm
kernel = rbf
C = 1.0
gamma = scale
random_state = 42

[FEATURES]
hog_orientations = 9
hog_pixels_per_cell = 8
hog_cells_per_block = 2

[PATHS]
model_path = experiments/model.pkl
scaler_path = experiments/scaler.pkl
test_data_path = experiments/test_data.pkl

[API]
host = 0.0.0.0
port = 5000
